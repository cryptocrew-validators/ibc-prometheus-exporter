# ──────────────────────────────────────────────────────────────────────────────
# IBC Prometheus Exporter config — Injective SA
# Home chain  : injective-1
# Counterparties: cosmoshub-4, osmosis-1, dydx-mainnet-1, neutron-1, agoric-3,
#                 phoenix-1 (Terra 2), secret-4, interwoven-1 (Initia), zigchain-1
