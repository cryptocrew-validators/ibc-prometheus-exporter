# ════════════════════════════════════════════════════════════
# HOME CHAIN
# ════════════════════════════════════════════════════════════

[[chains]]
name = "injective"
chain_id = "injective-1"
rpcs = [
    "https://s1.solva.solutions:8443/solva-internal/injective/rpc"
]
rests = [
    "https://lcd.injective.network"
]
home_chain = true
# Active clients on injective-1 for hermes-relayed counterparties
whitelist_clients = [
    "07-tendermint-5",    # → cosmoshub-4
    "07-tendermint-19",   # → osmosis-1
    "07-tendermint-126",  # → secret-4
    "07-tendermint-216",  # → phoenix-1
    "07-tendermint-233",  # → neutron-1
    "07-tendermint-256",  # → dydx-mainnet-1
]
blacklist_clients = []
whitelist_connections = []
blacklist_connections = []
whitelist_channels = []
blacklist_channels = [
    "icahost/channel-215",  # broken ICA ack path to neutron channel-829 (out-of-order acks 22–46)
]
state_refresh_interval = 1200
state_scan_timeout = 600

[chains.excluded_sequences]
# Stuck unreceived acks on injective source channels (hermes relay_ack_packet_messages).
# Commitments cleared on injective LCD; exclude here for home-side metrics.
# Counterparty-side metrics use the matching neutron/osmosis channels below.
# Neutron counterparty channels: 829→215, 4482→288, 4498→304, 4616→315, 5387→352,
# 5550→372, 5906→390, 6221→392. Osmosis counterparty: 77133→301.
channel-215 = ["22-46"]
channel-288 = ["1-3"]
channel-301 = ["18"]
channel-304 = ["58-74", "83-88", "97-102", "125"]
channel-315 = ["6-7"]
channel-352 = ["1-4", "11-18", "20"]
channel-372 = ["3"]
channel-390 = ["3"]
channel-392 = ["8-10", "15-19"]

