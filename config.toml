[[chains]]
name = "babylon"
chain_id = "bbn-1"
rpcs = [ 
    "https://rpc.babylon.network" 
]
# Optional explicit websocket endpoints. If omitted, the packet indexer derives
# ws(s)://.../websocket from the active RPC endpoint.
websockets = []
rests = [ 
    "https://lcd.babylon.network" 
]
home_chain = true
whitelist_clients = []
blacklist_clients = []
whitelist_connections = []
blacklist_connections = []
whitelist_channels = []
blacklist_channels = []
state_refresh_interval = 1200
state_scan_timeout = 600

# Excluded sequences for this chain by channel
[chains.excluded_sequences]
channel-7 = [ "2-6" ]

