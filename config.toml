[[chains]]
name = "axelar"
chain_id = "axelar-dojo-1"
rpcs = [""]
rests = [""]
home_chain = false
whitelist_clients = []
blacklist_clients = []
whitelist_connections = []
blacklist_connections = []
whitelist_channels = []
blacklist_channels = []
state_refresh_interval = 1200
state_scan_timeout = 600

[chains.excluded_sequences]
channel-0 = ["1", "2", "3-7", "9", "11"]
channel-1 = ["4", "5", "6"]

# General exporter settings
[exporter]
address = "0.0.0.0"
port = 8111
update_interval_seconds = 30
log_level = "DEBUG"
enable_chain_registry_fallbacks = true
omit_closed_channels = true
omit_inactive_clients = false

[indexer]
enabled = true
store_path = "packet-indexer.sqlite"
backfill_on_start_blocks = 10
gap_backfill = true
backfill_workers = 1
backfill_batch_size = 100
queue_size = 10000
prune_after_seconds = 604800
rpc_timeout_seconds = 10
reconnect_initial_seconds = 1
reconnect_max_seconds = 30
